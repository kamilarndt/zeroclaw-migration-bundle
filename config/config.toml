[query_classification]
enabled = true

[[query_classification.rules]]
hint = "local"
keywords = [
    "lokalny",
    "lokalnie",
    "test",
    "sprawdź",
    "weryfikuj",
    "podsumowanie",
    "hygiena",
    "heartbeat",
    "szybki",
    "format",
]
patterns = [
    "^local:",
    "^test:",
    "^check:",
    "^summary:",
    "^hygiene:",
    "^heartbeat:",
    "^format:",
    "^air:",
]
priority = 100

[[query_classification.rules]]
hint = "vision"
keywords = [
    "obraz",
    "zdjęcie",
    "foto",
    "grafika",
    "wygląd",
    "zrzut",
    "ekran",
]
patterns = ['\[IMAGE:']
min_length = 0
max_length = 0
priority = 95

[[query_classification.rules]]
hint = "complex"
keywords = [
    "złożony",
    "głęboki",
    "architektura",
    "rozumowanie",
    "skomplikowany",
    "reasoning",
]
patterns = [
    "^complex:",
    "^deep:",
    "^architect:",
    "^reasoning:",
    "^plan:",
]
priority = 90

[[query_classification.rules]]
hint = "premium"
keywords = [
    "zrecenzuj",
    "audyt",
    "debuguj",
    "premium",
    "zaawansowany",
]
patterns = [
    "^review:",
    "^audit:",
    "^debug:",
    "^premium:",
    "^v4.7:",
]
priority = 70

[[query_classification.rules]]
hint = "vision"
